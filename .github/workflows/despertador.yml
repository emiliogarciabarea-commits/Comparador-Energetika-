name: Despertador Real con Navegador 2
on:
  schedule:
    - cron: '0 * * * *' # Una vez por hora es suficiente si es una visita real
  workflow_dispatch:

jobs:
  wake_up:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Navegador
        run: |
          npm install playwright
          npx playwright install chromium
      
      - name: Visita Humana Simulada
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.goto('https://emiliogarciabarea-commits-comparador-energetika--app-ofjhwz.streamlit.app/?ping=true');
            await page.waitForTimeout(15000); // Se queda 15 segundos dentro
            console.log('Página cargada y activa');
            await browser.close();
          })();"
